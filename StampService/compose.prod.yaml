name: stampservice-prod

services:
  postgres:
    image: postgres
    container_name: stampservice-prod-postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  seq:
    image: datalust/seq:latest
    container_name: stampservice-prod-seq
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "${SEQ_HTTP_PORT:-5441}:80"
    volumes:
      - seq-data:/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: migrations
    container_name: stampservice-prod-migrate
    restart: "no"
    env_file:
      - .env.prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_ENVIRONMENT: Production
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: final
    container_name: stampservice-prod-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
      target: final
    container_name: stampservice-prod-bot
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: final
    container_name: stampservice-prod-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  seq-data:
