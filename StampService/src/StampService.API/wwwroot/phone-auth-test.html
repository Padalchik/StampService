<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phone Auth Test</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #17202a;
            --muted: #5d6b7a;
            --line: #d8dee6;
            --accent: #1769aa;
            --accent-strong: #0f4c81;
            --ok: #0f7b4f;
            --bad: #b42318;
            --code: #111827;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        main {
            width: min(920px, calc(100% - 32px));
            margin: 40px auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            line-height: 1.2;
            font-weight: 700;
        }

        .lead {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 380px) minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 20px;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 18px;
            line-height: 1.3;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-size: 14px;
            color: var(--muted);
        }

        input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 16px;
            color: var(--text);
            background: #fff;
        }

        input:focus {
            border-color: var(--accent);
            outline: 3px solid rgba(23, 105, 170, 0.15);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            min-height: 42px;
            padding: 0 14px;
            border: 1px solid var(--accent);
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: #fff;
            color: var(--accent);
        }

        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .status {
            min-height: 24px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.bad {
            color: var(--bad);
        }

        pre {
            min-height: 300px;
            max-height: 620px;
            margin: 0;
            overflow: auto;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #0f172a;
            color: #e5e7eb;
            font-size: 13px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .token {
            margin-top: 16px;
        }

        .token textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font: 13px/1.45 Consolas, "Courier New", monospace;
            color: var(--code);
        }

        @media (max-width: 760px) {
            main {
                width: min(100% - 20px, 920px);
                margin: 20px auto;
            }

            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>Проверка входа по телефону</h1>
    <p class="lead">Код будет отправлен администратору в Telegram через текущую временную реализацию доставки.</p>

    <div class="layout">
        <section>
            <h2>Авторизация</h2>

            <label for="phone">Телефон</label>
            <input id="phone" autocomplete="tel" inputmode="tel" value="+79991234567">

            <div class="actions">
                <button id="requestCode" type="button">Запросить код</button>
            </div>

            <label for="code">Код из Telegram</label>
            <input id="code" autocomplete="one-time-code" inputmode="numeric" maxlength="6" placeholder="123456">

            <div class="actions">
                <button id="verifyCode" type="button">Проверить код</button>
                <button id="clear" class="secondary" type="button">Очистить</button>
            </div>

            <div id="status" class="status"></div>

            <div class="token">
                <label for="token">JWT</label>
                <textarea id="token" readonly></textarea>
            </div>
        </section>

        <section>
            <h2>Ответ API</h2>
            <pre id="output">{}</pre>
        </section>
    </div>
</main>

<script>
    const phoneInput = document.getElementById('phone');
    const codeInput = document.getElementById('code');
    const tokenOutput = document.getElementById('token');
    const responseOutput = document.getElementById('output');
    const statusOutput = document.getElementById('status');
    const requestButton = document.getElementById('requestCode');
    const verifyButton = document.getElementById('verifyCode');
    const clearButton = document.getElementById('clear');

    requestButton.addEventListener('click', () => requestCode());
    verifyButton.addEventListener('click', () => verifyCode());
    clearButton.addEventListener('click', clearOutput);

    codeInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            event.preventDefault();
            verifyCode();
        }
    });

    async function requestCode() {
        await execute(
            requestButton,
            '/api/auth/phone/code',
            { phoneNumber: phoneInput.value },
            data => {
                tokenOutput.value = '';
                const expiresAt = data?.data?.expiresAt ?? data?.expiresAt;
                setStatus(`Код запрошен. Срок действия: ${formatDate(expiresAt)}`, 'ok');
                codeInput.focus();
            });
    }

    async function verifyCode() {
        await execute(
            verifyButton,
            '/api/auth/phone/verify',
            { phoneNumber: phoneInput.value, code: codeInput.value },
            data => {
                const token = data?.data?.token ?? data?.token ?? '';
                const userId = data?.data?.userId ?? data?.userId ?? '';
                tokenOutput.value = token;
                setStatus(`JWT получен. UserId: ${userId}`, 'ok');
            });
    }

    async function execute(button, url, body, onSuccess) {
        setBusy(button, true);
        setStatus('Запрос выполняется...', '');

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await readJson(response);
            renderResponse(response.status, data);

            if (!response.ok || hasErrors(data)) {
                setStatus(getErrorMessage(data) || `Ошибка HTTP ${response.status}`, 'bad');
                return;
            }

            onSuccess(data);
        } catch (error) {
            responseOutput.textContent = String(error);
            setStatus('Не удалось выполнить запрос', 'bad');
        } finally {
            setBusy(button, false);
        }
    }

    async function readJson(response) {
        const text = await response.text();
        if (!text) {
            return null;
        }

        try {
            return JSON.parse(text);
        } catch {
            return text;
        }
    }

    function hasErrors(data) {
        return Array.isArray(data?.errors) && data.errors.length > 0;
    }

    function getErrorMessage(data) {
        const firstError = Array.isArray(data?.errors) ? data.errors[0] : null;
        return firstError?.message ?? firstError?.code ?? null;
    }

    function renderResponse(status, data) {
        responseOutput.textContent = JSON.stringify({ status, response: data }, null, 2);
    }

    function setBusy(button, isBusy) {
        requestButton.disabled = isBusy;
        verifyButton.disabled = isBusy;
        button.disabled = isBusy;
    }

    function setStatus(text, type) {
        statusOutput.textContent = text;
        statusOutput.className = `status ${type}`;
    }

    function clearOutput() {
        codeInput.value = '';
        tokenOutput.value = '';
        responseOutput.textContent = '{}';
        setStatus('', '');
        codeInput.focus();
    }

    function formatDate(value) {
        if (!value) {
            return '-';
        }

        return new Date(value).toLocaleString();
    }
</script>
</body>
</html>
