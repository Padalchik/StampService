services:
  postgres:
    container_name: stamp_service_postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: stamp_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
