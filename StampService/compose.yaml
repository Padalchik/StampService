services:
  postgres:
    container_name: stamp_service_postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: stamp_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  seq:
    container_name: stamp_service_seq
    image: datalust/seq:latest
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "secure"
    ports:
      - "5441:80"
    volumes:
      - seq-data:/data

volumes:
  postgres-data:
  seq-data:
